<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de intervenciones</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #ededea;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e99;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --blue: #185FA5; --blue-dark: #0C447C;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --green-bg: #EAF3DE; --green-text: #3B6D11;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #333330;
      --text: #f0ede8; --text2: #a8a8a2; --text3: #6b6b65;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue-bg: #0C447C; --blue-text: #B5D4F4;
      --blue: #378ADD; --blue-dark: #85B7EB;
      --amber-bg: #633806; --amber-text: #FAC775;
      --green-bg: #27500A; --green-text: #C0DD97;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  header h1 { font-size: 20px; font-weight: 600; }
  .btn-primary { background: var(--blue); color: #E6F1FB; border: none; border-radius: var(--radius); padding: 8px 18px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: var(--blue-dark); }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 0.85rem 1rem; text-align: center; border: 0.5px solid var(--border); }
  .stat-n { font-size: 26px; font-weight: 600; }
  .stat-l { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .n-total { color: var(--text); } .n-pend { color: #BA7517; } .n-done { color: #3B6D11; }
  .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
  @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .sec-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.85rem; }
  .form-card { margin-bottom: 1rem; }
  .form-row { margin-bottom: 10px; }
  .form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; font-size: 14px; padding: 7px 10px;
    border: 0.5px solid var(--border2); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--blue); }
  .form-row textarea { height: 60px; resize: vertical; }
  .save-btn { width: 100%; background: var(--blue); color: #E6F1FB; border: none; border-radius: var(--radius); padding: 9px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px; }
  .save-btn:hover { background: var(--blue-dark); }

  /* Sync status */
  .sync-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); margin-bottom: 1rem; padding: 6px 10px; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #9e9e99; flex-shrink: 0; }
  .sync-dot.ok { background: #3B6D11; }
  .sync-dot.error { background: #A32D2D; }
  .sync-dot.loading { background: #BA7517; animation: pulse 1s infinite; }

  /* Voz */
  .voice-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .mic-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius);
    padding: 9px 14px; font-size: 13px; font-weight: 500; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .mic-btn:hover { border-color: var(--blue); color: var(--blue); }
  .mic-btn.listening { background: #FCEBEB; border-color: #E24B4A; color: #A32D2D; animation: pulse 1s infinite; }
  .mic-icon { width: 16px; height: 16px; border-radius: 50%; background: currentColor; position: relative; flex-shrink: 0; }
  .mic-icon::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 10px; height: 6px; border: 2px solid currentColor; border-top: none; border-radius: 0 0 8px 8px; background: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .voice-hint { font-size: 12px; color: var(--text3); margin-bottom: 10px; line-height: 1.5; padding: 8px 10px; background: var(--bg2); border-radius: var(--radius); border-left: 3px solid var(--blue); border-top-left-radius: 0; border-bottom-left-radius: 0; }
  .voice-status { font-size: 12px; color: var(--text2); margin-bottom: 8px; min-height: 18px; font-style: italic; }

  /* Cal */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .cal-nav span { font-size: 15px; font-weight: 500; }
  .cal-nav button { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 4px 13px; cursor: pointer; color: var(--text); font-size: 15px; }
  .cal-nav button:hover { background: var(--bg2); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .dow { font-size: 10px; color: var(--text3); text-align: center; padding-bottom: 6px; }
  .day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text); position: relative; transition: background 0.1s; }
  .day:hover { background: var(--bg2); }
  .day.other { color: var(--text3); }
  .day.today { background: var(--blue-bg); color: var(--blue-text); font-weight: 600; }
  .day.sel { background: var(--blue); color: #E6F1FB; font-weight: 600; }
  .day.has-ev::after { content: ''; position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: #D85A30; }
  .day.sel.has-ev::after { background: #B5D4F4; }
  .day-panel { margin-top: 0.85rem; border-top: 0.5px solid var(--border); padding-top: 0.75rem; min-height: 64px; }
  .day-panel-title { font-size: 12px; color: var(--text2); margin-bottom: 7px; }
  .no-ev { font-size: 13px; color: var(--text3); text-align: center; padding: 10px 0; }
  .ev { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: var(--radius); margin-bottom: 4px; background: var(--bg2); }
  .ev-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .ev-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ev-client { font-size: 13px; font-weight: 500; }
  .ev-desc { font-size: 11px; color: var(--text2); }
  .ev-del { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text3); padding: 0 2px; line-height: 1; flex-shrink: 0; }
  .ev-del:hover { color: #A32D2D; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .b-p { background: var(--amber-bg); color: var(--amber-text); }
  .b-a { background: var(--blue-bg); color: var(--blue-text); }
  .b-d { background: var(--green-bg); color: var(--green-text); }
  .dot-p { background: #BA7517; } .dot-a { background: #185FA5; } .dot-d { background: #3B6D11; }
  .list-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 6px; background: var(--bg); transition: border-color 0.1s; }
  .list-item:hover { border-color: var(--border2); }
  .li-main { flex: 1; min-width: 0; }
  .li-client { font-size: 14px; font-weight: 500; }
  .li-date { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .li-desc { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .li-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-left: 10px; }
  .empty-list { font-size: 14px; color: var(--text3); text-align: center; padding: 2rem 0; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 0.85rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text2); transition: all 0.1s; }
  .filter-btn.active { background: var(--blue); color: #E6F1FB; border-color: var(--blue); }
  .filter-btn:hover:not(.active) { background: var(--bg2); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Agenda de intervenciones</h1>
    <button class="btn-primary" id="toggleForm">+ Nueva</button>
  </header>

  <div class="sync-bar">
    <div class="sync-dot loading" id="syncDot"></div>
    <span id="syncLabel">Conectando con la nube...</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n n-total" id="s-total">0</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n n-pend" id="s-pend">0</div><div class="stat-l">Pendientes</div></div>
    <div class="stat"><div class="stat-n n-done" id="s-done">0</div><div class="stat-l">Completadas</div></div>
  </div>

  <div class="layout">
    <div>
      <div class="card form-card" id="formCard" style="display:none;">
        <div class="sec-label">Nueva intervención</div>
        <div class="voice-row">
          <button class="mic-btn" id="micBtn">
            <span class="mic-icon"></span>
            <span id="micLabel">Dictar por voz</span>
          </button>
        </div>
        <div class="voice-hint">Di algo como: <strong>"Cliente Juan García, revisión del compresor, el día 15 de mayo"</strong></div>
        <div class="voice-status" id="voiceStatus"></div>
        <div class="form-row"><label>Cliente</label><input type="text" id="f-client" placeholder="Nombre del cliente"></div>
        <div class="form-row"><label>Descripción del problema</label><textarea id="f-desc" placeholder="Breve descripción..."></textarea></div>
        <div class="form-row"><label>Fecha</label><input type="date" id="f-date"></div>
        <div class="form-row"><label>Estado</label>
          <select id="f-status">
            <option value="p">Pendiente</option>
            <option value="a">En curso</option>
            <option value="d">Completada</option>
          </select>
        </div>
        <button class="save-btn" id="saveBtn">Guardar intervención</button>
      </div>

      <div class="card">
        <div class="cal-nav">
          <button id="prevM">&#8249;</button>
          <span id="calTitle"></span>
          <button id="nextM">&#8250;</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="day-panel">
          <div class="day-panel-title" id="selDateLabel">Selecciona un día para ver intervenciones</div>
          <div id="dayEvents"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">Todas las intervenciones</div>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="p">Pendientes</button>
        <button class="filter-btn" data-filter="a">En curso</button>
        <button class="filter-btn" data-filter="d">Completadas</button>
      </div>
      <div id="allList"></div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNxhynAHI_lOpAbOSMWra6rx2837tugWg",
  authDomain: "agenda-intervenciones.firebaseapp.com",
  projectId: "agenda-intervenciones",
  storageBucket: "agenda-intervenciones.firebasestorage.app",
  messagingSenderId: "396676106755",
  appId: "1:396676106755:web:e7cf70c5de2e4566af5c36",
  measurementId: "G-96ZDHV9K3M"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAYS = ['L','M','X','J','V','S','D'];

let records = [];
let selDate = null;
let activeFilter = 'all';
const now = new Date();
let viewYear = now.getFullYear(), viewMonth = now.getMonth();

function todayStr() { return fmtDate(new Date()); }
function fmtDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function labelDate(s) { if(!s) return ''; const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y; }
function statusClass(st) { return st==='p'?'b-p':st==='a'?'b-a':'b-d'; }
function statusLabel(st) { return st==='p'?'Pendiente':st==='a'?'En curso':'Completada'; }
function dotClass(st) { return st==='p'?'dot-p':st==='a'?'dot-a':'dot-d'; }

function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = msg;
}

// Escucha en tiempo real Firestore
const q = query(collection(db, 'intervenciones'), orderBy('date'));
onSnapshot(q, (snapshot) => {
  records = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  setSyncStatus('ok', 'Sincronizado con la nube ✓');
  renderAll();
}, (error) => {
  setSyncStatus('error', 'Error de conexión — ' + error.message);
});

async function addRecord(data) {
  setSyncStatus('loading', 'Guardando...');
  try {
    await addDoc(collection(db, 'intervenciones'), data);
  } catch(e) {
    setSyncStatus('error', 'Error al guardar: ' + e.message);
  }
}

async function deleteRecord(id) {
  setSyncStatus('loading', 'Eliminando...');
  try {
    await deleteDoc(doc(db, 'intervenciones', id));
  } catch(e) {
    setSyncStatus('error', 'Error al eliminar: ' + e.message);
  }
}

window.deleteRecord = deleteRecord;

// --- VOZ ---
function parseVoiceText(text) {
  const result = { client: '', desc: '', date: '' };
  const t = text.toLowerCase();
  const ordinalMap = {primero:1,uno:1,dos:2,tres:3,cuatro:4,cinco:5,seis:6,siete:7,ocho:8,nueve:9,diez:10,
    once:11,doce:12,trece:13,catorce:14,quince:15,'dieciséis':16,dieciseis:16,diecisiete:17,dieciocho:18,
    diecinueve:19,veinte:20,veintiuno:21,'veintidós':22,veintidos:22,'veintitrés':23,veintitres:23,
    veinticuatro:24,veinticinco:25,'veintiséis':26,veintiseis:26,veintisiete:27,veintiocho:28,
    veintinueve:29,treinta:30,'treinta y uno':31};

  let foundDate = false;
  const dateRe = /(?:el d[ií]a|para el|el)\s+(\d{1,2}|treinta y uno|treinta|veinti\w+|veinte|quince|catorce|trece|doce|once|diez|nueve|ocho|siete|seis|cinco|cuatro|tres|dos|uno|primero)\s+de\s+(\w+)/i;
  const dateMatch = t.match(dateRe);
  if (dateMatch) {
    const dayRaw = dateMatch[1].trim();
    const monthRaw = dateMatch[2].trim();
    const dayNum = parseInt(dayRaw) || ordinalMap[dayRaw] || 0;
    const monthIdx = MONTHS_ES.findIndex(m => monthRaw.startsWith(m.substring(0,4)));
    if (dayNum > 0 && monthIdx >= 0) {
      const yr = now.getFullYear();
      const d = new Date(yr, monthIdx, dayNum);
      if (d < now) d.setFullYear(yr + 1);
      result.date = fmtDate(d); foundDate = true;
    }
  }
  if (!foundDate) {
    if (t.includes('pasado mañana')||t.includes('pasado manana')) { const d=new Date(); d.setDate(d.getDate()+2); result.date=fmtDate(d); foundDate=true; }
    else if (t.includes('mañana')||t.includes('manana')) { const d=new Date(); d.setDate(d.getDate()+1); result.date=fmtDate(d); foundDate=true; }
    else if (t.includes('hoy')) { result.date=todayStr(); foundDate=true; }
  }
  let clean = text;
  if (foundDate) clean = clean.replace(/(?:el d[ií]a|para el|el)\s+[\w\s]+de\s+\w+/i,'').replace(/(?:mañana|manana|pasado mañana|pasado manana|hoy)/i,'').trim();
  const clientRe = /cliente\s+([^,\.]+)/i;
  const clientMatch = clean.match(clientRe);
  if (clientMatch) { result.client = clientMatch[1].trim(); clean = clean.replace(clientRe,'').trim(); }
  let desc = clean.replace(/^[,\.\s]+/,'').replace(/,?\s*(el d[ií]a|para el|mañana|hoy)\s*/i,'').replace(/,\s*$/,'').trim();
  desc = desc.replace(/^[,\s\-]+|[,\s\-]+$/g,'').trim();
  if (desc.length > 3) result.desc = desc.charAt(0).toUpperCase() + desc.slice(1);
  return result;
}

let recognition = null;
let isListening = false;

function setupVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('micBtn').style.display='none'; document.querySelector('.voice-hint').style.display='none'; return; }
  recognition = new SR();
  recognition.lang = 'es-ES'; recognition.continuous = false; recognition.interimResults = true;
  recognition.onstart = () => { isListening=true; document.getElementById('micBtn').classList.add('listening'); document.getElementById('micLabel').textContent='Escuchando...'; document.getElementById('voiceStatus').textContent='Habla ahora...'; };
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('voiceStatus').textContent='"'+transcript+'"';
    if (e.results[e.results.length-1].isFinal) {
      const parsed = parseVoiceText(transcript);
      if (parsed.client) document.getElementById('f-client').value=parsed.client;
      if (parsed.desc) document.getElementById('f-desc').value=parsed.desc;
      if (parsed.date) document.getElementById('f-date').value=parsed.date;
      document.getElementById('voiceStatus').textContent='Campos rellenados. Revisa y guarda.';
    }
  };
  recognition.onerror = () => { document.getElementById('voiceStatus').textContent='No se pudo escuchar. Inténtalo de nuevo.'; stopListening(); };
  recognition.onend = () => { stopListening(); };
}

function stopListening() { isListening=false; document.getElementById('micBtn').classList.remove('listening'); document.getElementById('micLabel').textContent='Dictar por voz'; }

document.getElementById('micBtn').onclick = function() {
  if (!recognition) return;
  if (isListening) { recognition.stop(); return; }
  document.getElementById('f-client').value=''; document.getElementById('f-desc').value=''; document.getElementById('f-date').value=''; document.getElementById('voiceStatus').textContent='';
  recognition.start();
};

// --- CALENDARIO ---
function buildCal() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => { const el=document.createElement('div'); el.className='dow'; el.textContent=d; grid.appendChild(el); });
  const first = new Date(viewYear, viewMonth, 1);
  const startDow = (first.getDay()+6)%7;
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevDays = new Date(viewYear, viewMonth, 0).getDate();
  const todS = todayStr();
  for (let i=0; i<startDow; i++) { const el=document.createElement('div'); el.className='day other'; el.textContent=prevDays-startDow+1+i; grid.appendChild(el); }
  for (let d=1; d<=daysInMonth; d++) {
    const el=document.createElement('div'); el.className='day';
    const ds=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    el.textContent=d;
    if(ds===todS) el.classList.add('today');
    if(ds===selDate) el.classList.add('sel');
    if(records.some(r=>r.date===ds)) el.classList.add('has-ev');
    el.onclick=()=>{ selDate=ds; buildCal(); renderDayPanel(); };
    grid.appendChild(el);
  }
  document.getElementById('calTitle').textContent=MONTHS[viewMonth]+' '+viewYear;
}

function renderDayPanel() {
  const lbl=document.getElementById('selDateLabel');
  const box=document.getElementById('dayEvents');
  if(!selDate){lbl.textContent='Selecciona un día para ver intervenciones';box.innerHTML='';return;}
  const evs=records.filter(r=>r.date===selDate);
  lbl.textContent=labelDate(selDate)+(evs.length?' — '+evs.length+' intervención'+(evs.length>1?'es':''):'');
  if(!evs.length){box.innerHTML='<div class="no-ev">Sin intervenciones este día</div>';return;}
  box.innerHTML=evs.map(r=>`
    <div class="ev">
      <div class="ev-left">
        <div class="ev-dot ${dotClass(r.status)}"></div>
        <div><div class="ev-client">${r.client}</div>${r.desc?`<div class="ev-desc">${r.desc}</div>`:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="badge ${statusClass(r.status)}">${statusLabel(r.status)}</span>
        <button class="ev-del" onclick="deleteRecord('${r.id}')">×</button>
      </div>
    </div>`).join('');
}

function renderList() {
  const box=document.getElementById('allList');
  let filtered=records.filter(r=>activeFilter==='all'||r.status===activeFilter);
  const sorted=[...filtered].sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length){box.innerHTML='<div class="empty-list">Sin intervenciones</div>';return;}
  box.innerHTML=sorted.map(r=>`
    <div class="list-item">
      <div class="li-main">
        <div class="li-client">${r.client}</div>
        <div class="li-date">${labelDate(r.date)}</div>
        ${r.desc?`<div class="li-desc">${r.desc}</div>`:''}
      </div>
      <div class="li-right">
        <span class="badge ${statusClass(r.status)}">${statusLabel(r.status)}</span>
        <button class="ev-del" onclick="deleteRecord('${r.id}')">×</button>
      </div>
    </div>`).join('');
}

function renderStats() {
  document.getElementById('s-total').textContent=records.length;
  document.getElementById('s-pend').textContent=records.filter(r=>r.status==='p').length;
  document.getElementById('s-done').textContent=records.filter(r=>r.status==='d').length;
}

function renderAll() { buildCal(); renderDayPanel(); renderList(); renderStats(); }

document.getElementById('toggleForm').onclick=function(){
  const fc=document.getElementById('formCard');
  const showing=fc.style.display!=='none';
  fc.style.display=showing?'none':'block';
  this.textContent=showing?'+ Nueva':'× Cerrar';
  if(!showing) document.getElementById('f-date').value=selDate||todayStr();
};

document.getElementById('saveBtn').onclick=async function(){
  const client=document.getElementById('f-client').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const date=document.getElementById('f-date').value;
  const status=document.getElementById('f-status').value;
  if(!client||!date){alert('Indica el cliente y la fecha.');return;}
  await addRecord({ client, desc, date, status });
  document.getElementById('f-client').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-date').value='';
  document.getElementById('f-status').value='p';
  document.getElementById('formCard').style.display='none';
  document.getElementById('toggleForm').textContent='+ Nueva';
  selDate=date;
};

document.getElementById('prevM').onclick=function(){viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}buildCal();};
document.getElementById('nextM').onclick=function(){viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}buildCal();};

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    activeFilter=this.dataset.filter;
    renderList();
  };
});

setupVoice();
renderAll();
</script>
</body>
</html>
